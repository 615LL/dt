
# 创建 index.html 文件
html_content = '''<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陶喆音乐专辑溯源系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px 16px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 24px 0 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        .header-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
        }
        
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        
        .header p {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 12px;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }
        
        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #2ed573;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            flex-shrink: 0;
            min-width: 80px;
        }
        
        .info-value {
            font-size: 14px;
            color: #fff;
            text-align: right;
            word-break: break-all;
            font-weight: 500;
        }
        
        .timeline {
            position: relative;
            padding-left: 24px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: linear-gradient(to bottom, #e94560, rgba(233, 69, 96, 0.2));
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 20px;
        }
        
        .timeline-item:last-child {
            padding-bottom: 0;
        }
        
        .timeline-dot {
            position: absolute;
            left: -20px;
            top: 4px;
            width: 12px;
            height: 12px;
            background: #e94560;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
        }
        
        .timeline-item.completed .timeline-dot {
            background: #2ed573;
        }
        
        .timeline-time {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 2px;
        }
        
        .timeline-event {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .timeline-location {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        
        .conclusion-box {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.15), rgba(255, 107, 107, 0.1));
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255,255,255,0.9);
        }
        
        .footer {
            text-align: center;
            padding: 20px 0 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }
        
        .error-box {
            text-align: center;
            padding: 40px 20px;
        }
        
        .error-box .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .error-box h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #ff6b6b;
        }
        
        .error-box p {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(233, 69, 96, 0.2);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p style="color: rgba(255,255,255,0.6); font-size: 14px;">正在加载溯源信息...</p>
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 格式化日期
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
        }

        // 渲染页面
        function renderProduct(product) {
            const app = document.getElementById('app');
            
            const logisticsHtml = product.logistics.map(item => `
                <div class="timeline-item ${item.status}">
                    <div class="timeline-dot"></div>
                    <div class="timeline-time">${item.time}</div>
                    <div class="timeline-event">${item.event}</div>
                    <div class="timeline-location">📍 ${item.location}</div>
                </div>
            `).join('');
            
            app.innerHTML = `
                <div class="header">
                    <div class="header-icon">🎵</div>
                    <h1>陶喆专辑溯源系统</h1>
                    <p>正品验证 · 全程追溯</p>
                    <div class="status-badge">溯源验证通过</div>
                </div>
                
                <div class="card">
                    <div class="card-title">📀 专辑信息</div>
                    <div class="info-row">
                        <span class="info-label">专辑名称</span>
                        <span class="info-value">${product.album_name}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">音乐编号</span>
                        <span class="info-value">${product.music_code}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">批次号</span>
                        <span class="info-value">${product.batch}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">产地</span>
                        <span class="info-value">${product.origin}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">生产日期</span>
                        <span class="info-value">${formatDate(product.production_date)}</span>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">🔬 检测结果</div>
                    <div class="info-row" style="border-bottom: none;">
                        <span class="info-value" style="text-align: left; color: #2ed573; font-weight: 600;">${product.test_result}</span>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">🚚 物流时间轴</div>
                    <div class="timeline">
                        ${logisticsHtml}
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">✅ 溯源结论</div>
                    <div class="conclusion-box">
                        ${product.trace_conclusion}
                    </div>
                </div>
                
                <div class="footer">
                    <p>陶喆音乐正版溯源系统 © 2024</p>
                    <p style="margin-top: 4px;">技术支持：防伪溯源平台</p>
                </div>
            `;
        }

        // 渲染错误页面
        function renderError(message) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="error-box">
                    <div class="icon">⚠️</div>
                    <h2>未找到产品信息</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        // 主逻辑
        async function init() {
            const productId = getUrlParam('id');
            
            if (!productId) {
                renderError('请在URL中添加 ?id=产品ID 参数，例如：<br>?id=DT001');
                return;
            }
            
            try {
                const response = await fetch('products.json');
                if (!response.ok) {
                    throw new Error('无法加载产品数据');
                }
                const data = await response.json();
                const product = data.products.find(p => p.id === productId);
                
                if (!product) {
                    renderError(`未找到ID为 "${productId}" 的产品信息。<br>可用ID：DT001、DT002`);
                    return;
                }
                
                renderProduct(product);
            } catch (error) {
                renderError('加载数据失败：' + error.message);
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>'''

with open('/mnt/agents/output/index.html', 'w', encoding='utf-8') as f:
    f.write(html_content)

print("index.html 已创建")
